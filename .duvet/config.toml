'$schema' = "https://awslabs.github.io/duvet/config/v0.4.0.json"

[[source]]
pattern = "http3/**/*.rs"

[[specification]]
source = "https://www.rfc-editor.org/rfc/rfc9114"

[[specification]]
source = "https://www.rfc-editor.org/rfc/rfc9204.html"

[report.html]
enabled = true
issue-link = "https://github.com/0x676e67/http3-rs/issues"
blob-link = "https://github.com/0x676e67/http3-rs/blob/${{ SHA || GITHUB_SHA || 'main' }}"

# Enable snapshots to prevent requirement coverage regressions
[report.snapshot]
enabled = true
